kind = "web"
previewPath = "/"
title = "Autobody Shop"
version = "1.0.0"
id = "artifacts/autobody"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23455

[services.development]
run = "pnpm --filter @workspace/autobody run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autobody", "run", "build" ]
publicDir = "artifacts/autobody/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23455"
BASE_PATH = "/"
